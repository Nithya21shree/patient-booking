<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospitals Near You</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#e8f4ff,#fefae0);
}
h1{
    text-align:center;
    padding:30px 0 10px;
}
.container{
    width:900px;
    max-width:95%;
    margin:auto;
    padding-bottom:50px;
}
.card{
    background:white;
    border-radius:14px;
    padding:18px 22px;
    margin:18px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    cursor:pointer;
    transition:0.2s;
}
.card:hover{ transform:scale(1.02); }
.card h3{ margin:0 0 6px 0; }
.small{ color:#555; font-size:14px; }
.row{ display:flex; justify-content:space-between; align-items:center; }
.badge{
    background:#2563eb; color:white;
    padding:6px 12px; border-radius:20px; font-size:13px;
}
/* popup */
.popup{
  position:fixed; inset:0;
  background:rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:1000;
}
.popup-inner{
  width:360px; background:white; padding:20px;
  border-radius:14px; box-shadow:0 20px 40px rgba(0,0,0,.2);
}
.popup-inner h2{ margin-top:0; }
.popup-inner button{
  width:100%; padding:10px; margin-top:10px;
  border:none; border-radius:8px;
  background:#2563eb; color:white; cursor:pointer;
}
.popup-inner .close-btn{ background:#eee; color:#333; }
/* back button */
.back-btn{
  display:block; margin:20px auto; padding:10px 20px;
  background:#2563eb; color:white; border:none;
  border-radius:8px; cursor:pointer;
}
/* star rating */
.stars span {
  font-size:24px; cursor:pointer; color:#ccc;
}
.stars span.active { color:#f5b301; }
</style>
</head>

<body>

<h1>Hospitals Near You</h1>

<div style="text-align:center;margin-bottom:20px;">
  <select id="departmentSelect">
    <option value="Cardiology">Cardiology</option>
    <option value="Neurology">Neurology</option>
    <option value="Orthopaedics">Orthopaedics</option>
    <option value="Pediatrics">Pediatrics</option>
    <option value="Emergency">Emergency</option>
    <option value="ENT">ENT</option>
    <option value="Dermatology">Dermatology</option>
    <option value="Oncology">Oncology</option>
    <option value="Gynaecology">Gynaecology</option>
    <option value="General Medicine">General Medicine</option>
    <option value="Ophthalmology">Ophthalmology</option>
    <option value="Pulmonology">Pulmonology</option>
    <option value="Gastroenterology">Gastroenterology</option>
    <option value="Urology">Urology</option>
    <option value="Psychiatry">Psychiatry</option>
    <option value="Obstetrics">Obstetrics</option>
    <option value="Neonatology">Neonatology</option>
    <option value="Dental Care">Dental Care</option>
    <option value="Physician">Physician</option>
  </select>
  <button onclick="loadHospitals()">Search</button>
</div>

<div class="container" id="cards">Loading...</div>

<button class="back-btn" onclick="window.location='sector.html'">⬅ Back to Department Selection</button>

<script src="/config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  addDoc,
  doc,
  getDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = window.firebaseConfig;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const cards = document.getElementById("cards");

const params = new URLSearchParams(window.location.search);
const deptFromQuery = params.get("department");

if (deptFromQuery) {
  document.getElementById("departmentSelect").value = deptFromQuery;
  loadHospitals();
} else {
  loadHospitals();
}

async function loadHospitals() {
  const dept = document.getElementById("departmentSelect").value;
  cards.innerHTML = "Loading...";

  try {
    let hospitalsQuery;
    if (dept) {
      hospitalsQuery = query(collection(db, "hospitals"), where("department", "==", dept));
    } else {
      hospitalsQuery = collection(db, "hospitals");
    }

    const snapshot = await getDocs(hospitalsQuery);
    cards.innerHTML = "";

    if (snapshot.empty) {
      cards.innerHTML = `<p>No hospitals found for department: ${dept}</p>`;
      return;
    }

    snapshot.forEach(docSnap => {
      const hospital = { id: docSnap.id, ...docSnap.data() };
      const div = document.createElement("div");
      div.className = "card";
      div.onclick = () => openHospital(hospital);
      const ratingText = hospital.ratingAverage ? `${hospital.ratingAverage.toFixed(1)} (${hospital.ratingCount || 0})` : "Not yet rated";

      div.innerHTML = `
        <h3>${hospital.name}</h3>
        <div class="small">${hospital.address}</div>
        <div class="row" style="margin-top:10px">
          <span class="badge">${hospital.department}</span>
          <div class="small">Rating: ⭐ ${ratingText}</div>
        </div>
        <div class="small">Contact: ${hospital.contact || "N/A"}</div>
      `;
      cards.appendChild(div);
    });
  } catch (error) {
    console.error("Error loading hospitals:", error);
    cards.innerHTML = "<p>Error loading hospitals. Please try again.</p>";
  }
}

function openHospital(hospital) {
  const mapLink = hospital.lat && hospital.lon
    ? `https://www.google.com/maps/dir/?api=1&origin=My+Location&destination=${hospital.lat},${hospital.lon}`
    : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hospital.address)}`;

  const pop = document.createElement("div");
  pop.className = "popup";
  const ratingText = hospital.ratingAverage ? `${hospital.ratingAverage.toFixed(1)} (${hospital.ratingCount || 0})` : "Not yet rated";

  pop.innerHTML = `
    <div class="popup-inner">
      <h2>${hospital.name}</h2>
      <div class="small">${hospital.address}</div>
      <div class="small">Department: ${hospital.department}</div>
      <div class="small">Contact: <a href="tel:${hospital.contact}">${hospital.contact || "N/A"}</a></div>
      <div class="small">Rating: ⭐ ${ratingText}</div>
      <br>
      <a href="${mapLink}" target="_blank">📍 See Directions from Your Location</a>
      <button onclick="bookToken('${hospital.id}','${hospital.name.replace(/'/g, "\\'")}','${hospital.department.replace(/'/g, "\\'")}','${hospital.address.replace(/'/g, "\\'")}')">Book token</button>
      <div style="margin-top:10px">
        <span class="small">Rate this hospital:</span><br>
        <div class="stars" id="stars">
          <span onclick="highlightStars(this,1,'${hospital.id}')">★</span>
          <span onclick="highlightStars(this,2,'${hospital.id}')">★</span>
          <span onclick="highlightStars(this,3,'${hospital.id}')">★</span>
          <span onclick="highlightStars(this,4,'${hospital.id}')">★</span>
          <span onclick="highlightStars(this,5,'${hospital.id}')">★</span>
        </div>
      </div>
      <button class="close-btn" onclick="this.closest('.popup').remove()">Close</button>
    </div>
  `;

  document.body.appendChild(pop);
}

async function bookToken(hospitalId, hospitalName, department, address) {
  try {
    const tokenNumber = `T${Date.now().toString().slice(-6)}`;
    const waitMinutes = Math.floor(Math.random() * 25) + 5;

    await addDoc(collection(db, "bookings"), {
      hospitalId,
      hospitalName,
      department,
      tokenNumber,
      status: "booked",
      waitMinutes,
      createdAt: serverTimestamp()
    });

    window.location = `book_token.html?hospital=${encodeURIComponent(hospitalName)}&department=${encodeURIComponent(department)}&address=${encodeURIComponent(address)}&token=${encodeURIComponent(tokenNumber)}&wait=${waitMinutes}`;
  } catch (error) {
    console.error("Booking error:", error);
    alert("Unable to book token. Please try again.");
  }
}

function highlightStars(el, rating, hospitalId) {
  const stars = el.parentNode.querySelectorAll("span");
  stars.forEach((s, i) => s.classList.toggle("active", i < rating));
  rateHospital(hospitalId, rating);
}

async function rateHospital(hospitalId, rating) {
  try {
    const hospitalRef = doc(db, "hospitals", hospitalId);
    const hospitalSnap = await getDoc(hospitalRef);
    if (!hospitalSnap.exists()) {
      alert("Hospital not found.");
      return;
    }
    const hospitalData = hospitalSnap.data();
    const oldCount = hospitalData.ratingCount || 0;
    const oldAvg = hospitalData.ratingAverage || 0;
    const newCount = oldCount + 1;
    const newAvg = ((oldAvg * oldCount) + rating) / newCount;

    await addDoc(collection(db, "ratings"), {
      hospitalId,
      rating,
      createdAt: serverTimestamp()
    });

    await updateDoc(hospitalRef, {
      ratingAverage: newAvg,
      ratingCount: newCount
    });

    alert("Thanks for rating! Your rating has been recorded.");
  } catch (error) {
    console.error("Rating error:", error);
    alert("Unable to save rating. Please try again.");
  }
}

window.loadHospitals = loadHospitals;
window.bookToken = bookToken;
window.highlightStars = highlightStars;
</script>
</body>
</html>
