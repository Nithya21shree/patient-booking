<!DOCTYPE html>
<html>
<head>
<title>Location</title>

<style>
html,body{
    height:100%;
    margin:0;
    font-family:Arial, sans-serif;
}

/* full background */
body{
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg,#dbeafe,#fef3c7);
}

/* center card */
.box{
    background:white;
    width:380px;
    padding:35px 30px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.box h2{
    margin:0;
    margin-bottom:10px;
}

.box p{
    margin:0;
    margin-bottom:25px;
    color:#555;
}

/* button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="box">
    <h2>Turn on location</h2>
    <p>Let this app access your location</p>

    <button onclick="allowLocation()">ALLOW</button>
</div>

<script>
function allowLocation(){

    if(!navigator.geolocation){
        alert("Location not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(pos){
            window.location.href="hospital.html";
        },
        function(){
            alert("Please allow location access");
        }
    );
}
</script>

</body>
</html>
