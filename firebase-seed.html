<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Firestore Seed</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f4f7fb; color: #111; }
    h1 { margin-top: 0; }
    button { padding: 12px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    button:disabled { background: #94a3b8; }
    pre { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,.08); margin-top: 16px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Firestore Seed Page</h1>
  <p>Click the button below to create the Firestore collections used by your app.</p>
  <button id="seedButton">Create collections</button>
  <pre id="status">Status: ready</pre>

  <script src="/config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = window.firebaseConfig;
      apiKey: "AIzaSyD82vHQyaLHN2M2BUB7BF2sew_qRcHyBbk",
      authDomain: "hospital-1739a.firebaseapp.com",
      projectId: "hospital-1739a",
      storageBucket: "hospital-1739a.firebasestorage.app",
      messagingSenderId: "23652913355",
      appId: "1:23652913355:web:336020b380b4a9b387cb4e",
      measurementId: "G-3SHW4MC27C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const status = document.getElementById('status');
    const seedButton = document.getElementById('seedButton');

    seedButton.addEventListener('click', async () => {
      seedButton.disabled = true;
      status.textContent = 'Status: creating sample documents...';

      try {
        await setDoc(doc(db, 'hospitals', 'hospital1'), {
          name: 'City Hospital',
          address: '123 Main Street, Your City',
          department: 'Cardiology',
          contact: '9876543210',
          ratingAverage: 4.6,
          ratingCount: 38,
          createdAt: serverTimestamp()
        });

        await setDoc(doc(db, 'hospitals', 'hospital2'), {
          name: 'Sunrise Medical Centre',
          address: '45 Health Avenue, Your City',
          department: 'Neurology',
          contact: '9123456780',
          ratingAverage: 4.3,
          ratingCount: 22,
          createdAt: serverTimestamp()
        });

        await setDoc(doc(db, 'bookings', 'booking1'), {
          hospitalId: 'hospital1',
          hospitalName: 'City Hospital',
          department: 'Cardiology',
          tokenNumber: 'T001',
          status: 'booked',
          waitMinutes: 20,
          createdAt: serverTimestamp()
        });

        await setDoc(doc(db, 'ratings', 'rating1'), {
          hospitalId: 'hospital1',
          hospitalName: 'City Hospital',
          rating: 5,
          comment: 'Excellent service and fast booking.',
          createdAt: serverTimestamp()
        });

        status.textContent = 'Status: completed. Collections created: hospitals, bookings, ratings.';
      } catch (error) {
        status.textContent = 'Error: ' + error.message;
      } finally {
        seedButton.disabled = false;
      }
    });
  </script>
</body>
</html>
